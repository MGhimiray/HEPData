data_file: table_3.yaml
description: Systematic uncertainties in the signal strength $\mu$, defined as the
  measured inclusive EW cross sections divided by the predicted cross sections. Lepton
  experimental uncertainties encompass the effects of the calibration of lepton momentum
  scale and resolution, as well as lepton trigger, reconstruction, identification,
  and isolation efficiencies. Jet experimental uncertainties encompass the effects
  of JES and JER. The limited sample size refers to the finite number of MC and data
  events used to estimate the backgrounds.
keywords:
- name: observables
  values:
  - relative uncertainty
location: Data from Table 3
name: Table 3
